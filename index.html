<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>FG Tracker</title>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
padding:20px;
}

h2{
text-align:center;
}

video{
width:100%;
border:2px solid #999;
border-radius:10px;
background:#000;
}

input{
width:100%;
padding:12px;
margin-top:10px;
font-size:18px;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
margin-top:12px;
font-size:18px;
cursor:pointer;
}

#status{
margin:15px 0;
font-weight:bold;
color:green;
text-align:center;
}

</style>

</head>

<body>

<h2>FG Tracker</h2>

<video id="video" autoplay playsinline muted></video>

<div id="status">
اضغط Scan لبدء القراءة
</div>

<input id="wo" placeholder="Work Order">

<input id="pallet" placeholder="Pallet">

<input id="packs" placeholder="Packs">

<input id="reels" value="05" placeholder="Reels">

<button onclick="startScanner()">
📷 Scan Barcode
</button>

<button onclick="saveData()">
Save
</button>

<script>

const video = document.getElementById("video");
const status = document.getElementById("status");

let reader = null;
let controls = null;
  async function startScanner(){

  status.innerHTML = "📷 جاري تشغيل الكاميرا...";

  if(reader){
    reader.reset();
  }

  reader = new ZXing.BrowserMultiFormatReader();

  try{

    const devices = await reader.listVideoInputDevices();

    const backCamera =
      devices.find(d =>
        d.label.toLowerCase().includes("back") ||
        d.label.toLowerCase().includes("rear")
      );

    const deviceId = backCamera
      ? backCamera.deviceId
      : devices[0].deviceId;

    reader.decodeFromVideoDevice(
      deviceId,
      video,
      (result, err) => {

        if(result){

          let data = result.getText().trim();

          data = data.replace(/\D/g,"").slice(-20);

          document.getElementById("packs").value =
            data.substring(0,5);

          document.getElementById("wo").value =
            data.substring(5,16);

          document.getElementById("pallet").value =
            data.substring(16,19);

          status.innerHTML = "✅ تم قراءة الباركود";

          reader.reset();

        }

      }
    );

  }catch(e){

    alert("خطأ في تشغيل الكاميرا:\n" + e);

  }

}
  function saveData(){

  const wo = document.getElementById("wo").value.trim();
  const pallet = document.getElementById("pallet").value.trim();
  const packs = document.getElementById("packs").value.trim();
  const reels = document.getElementById("reels").value.trim();

  if(!wo || !pallet || !packs){

    alert("اقرأ الباركود أولاً");

    return;

  }

  const noEntry = wo + "-" + pallet.padStart(3,"0");

  fetch("https://script.google.com/macros/s/AKfycbxvJC89G5wcuWkJQT7PxcztVrWYAMV_BAe4bMr0qswV2QHbkmbo03pSWoWUzk3tEdRaCA/exec",{

    method:"POST",

    headers:{
      "Content-Type":"text/plain;charset=utf-8"
    },

    body:JSON.stringify({

      workOrder:wo,
      pallet:pallet,
      noEntry:noEntry,
      packs:packs,
      reels:reels

    })

  })

  .then(r=>r.json())

  .then(r=>{

    if(r.success){

      status.innerHTML="✅ تم الحفظ";

      document.getElementById("wo").value="";
      document.getElementById("pallet").value="";
      document.getElementById("packs").value="";
      document.getElementById("reels").value="05";

    }else{

      alert("فشل الحفظ");

    }

  })

  .catch(err=>{

    console.log(err);

    alert("خطأ أثناء الإرسال");

  });

}
  </script>

</body>

</html>
