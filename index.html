<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>FG Tracker</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
margin:0;
}

h2{
text-align:center;
}

video{
width:100%;
border:2px solid #999;
border-radius:10px;
margin-top:15px;
}

input{
width:100%;
padding:12px;
font-size:18px;
margin-top:10px;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
font-size:18px;
margin-top:12px;
}

#status{
margin-top:15px;
font-weight:bold;
color:green;
text-align:center;
}

</style>

</head>

<body>

<h2>FG Tracker</h2>

<div id="reader" style="width:100%;"></div>
<div id="status">
اضغط Scan لبدء القراءة
</div>

<input id="wo" placeholder="Work Order">

<input id="pallet" placeholder="Pallet">

<input id="packs" placeholder="Packs">

<input id="reels" placeholder="Reels">

<button onclick="startScanner()">
📷 Scan Barcode
</button>

<button onclick="saveData()">
Save
</button>

<script>
const status = document.getElementById("status");


async function startScanner() {

  const html5QrCode = new Html5Qrcode("reader");

  try {

    await html5QrCode.start(

{
facingMode:"environment"
},

{
fps:10,
qrbox:{width:300,height:300},
formatsToSupport:[
Html5QrcodeSupportedFormats.DATA_MATRIX,
Html5QrcodeSupportedFormats.CODE_128
]
},

      {
        fps: 10,
        qrbox: {
          width: 300,
          height: 300
        }
      },

      function(decodedText) {

        html5QrCode.stop();

        let data = decodedText.trim();

        data = data.replace(/\D/g,"").slice(-20);

        document.getElementById("packs").value =
        data.substring(0,5);

        document.getElementById("wo").value =
        data.substring(5,16);

        document.getElementById("pallet").value =
        data.substring(16,19);
                document.getElementById("status").innerHTML =
        "✅ تم قراءة الباركود";

      },

      function(errorMessage) {
        // تجاهل أخطاء البحث المستمرة
      }

    );

  } catch (err) {

    alert("تعذر تشغيل الكاميرا\n" + err);

  }

}
  function saveData(){

  const wo = document.getElementById("wo").value;
  const pallet = document.getElementById("pallet").value;
  const packs = document.getElementById("packs").value;
  const reels = document.getElementById("reels").value;

  if(!wo || !pallet || !packs){
    alert("اقرأ الباركود أولاً");
    return;
  }

  const noEntry = wo + "-" + pallet.padStart(3,"0");

  fetch("https://script.google.com/macros/s/AKfycbxvJC89G5wcuWkJQT7PxcztVrWYAMV_BAe4bMr0qswV2QHbkmbo03pSWoWUzk3tEdRaCA/exec", {

  method: "POST",

  body: JSON.stringify({

    workOrder: wo,

    pallet: pallet,

    packs: packs,

    reels: reels

  })

})

.then(r => r.json())

.then(r => {

  if(r.success){

    status.innerHTML="✅ تم الحفظ";

    document.getElementById("wo").value="";

    document.getElementById("pallet").value="";

    document.getElementById("packs").value="";

    document.getElementById("reels").value="";

  }else{

    alert(r.error);

  }

})

.catch(e=>alert(e));

}

</script>

</body>
</html>
