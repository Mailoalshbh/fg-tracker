<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>FG Tracker</title>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
padding:20px;
}

h2{
text-align:center;
}

#video{
width:100%;
border:2px solid #999;
border-radius:10px;
background:#000;
}

input{
width:100%;
padding:12px;
margin-top:10px;
font-size:18px;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
margin-top:12px;
font-size:18px;
}

#status{
margin-top:15px;
font-weight:bold;
text-align:center;
color:green;
}

</style>

</head>

<body>

<h2>FG Tracker</h2>

<div id="reader" style="width:100%;"></div>
<div id="status">
اضغط Scan
</div>

<input id="packs" placeholder="Packs">

<input id="wo" placeholder="Work Order">

<input id="pallet" placeholder="Pallet">

<input id="reels" value="05">

<button onclick="startScanner()">
📷 Scan Barcode
</button>

<button onclick="saveData()">
Save
</button>

<script>

const status=document.getElementById("status");

async function startScanner() {

  status.innerHTML = "📷 جاري تشغيل الكاميرا...";

  const html5QrCode = new Html5Qrcode("reader");

  try {
alert("دخلت startScanner");
    await html5QrCode.start(

      { facingMode: "environment" },

      {
        fps: 60,
       disableFlip: true
      },

      function(decodedText) {

status.innerHTML = decodedText;
html5QrCode.stop().then(() => {
    document.getElementById("reader").innerHTML = "";
});
let data = decodedText
    .replace("]C1","")
    .replace(/\//g,"")
    .replace(/\s/g,"")
    .trim();
        document.getElementById("packs").value =
          data.substring(0,5);

        document.getElementById("wo").value =
          data.substring(5,16);

        document.getElementById("pallet").value =
          data.substring(16,19);

        status.innerHTML = "✅ تم قراءة الباركود";

      },

      function(errorMessage) {
        // تجاهل أخطاء البحث أثناء المسح
      }

    );

  } catch (e) {

    alert("خطأ في تشغيل الكاميرا\n" + e);

  }

}
  function saveData(){

  const wo=document.getElementById("wo").value.trim();
  const pallet=document.getElementById("pallet").value.trim();
  const packs=document.getElementById("packs").value.trim();
  const reels=document.getElementById("reels").value.trim();

  if(!wo || !pallet || !packs){

    alert("اقرأ الباركود أولاً");

    return;

  }

  const noEntry=wo+"-"+pallet.padStart(3,"0");

  fetch("https://script.google.com/macros/s/AKfycbxvJC89G5wcuWkJQT7PxcztVrWYAMV_BAe4bMr0qswV2QHbkmbo03pSWoWUzk3tEdRaCA/exec",{

    method:"POST",

    headers:{
      "Content-Type":"application/json"
    },

    body:JSON.stringify({

      workOrder:wo,
      pallet:pallet,
      noEntry:noEntry,
      packs:packs,
      reels:reels

    })

  })

  .then(r=>r.json())

  .then(r=>{

    if(r.success){

      status.innerHTML="✅ تم الحفظ";

      document.getElementById("wo").value="";
      document.getElementById("pallet").value="";
      document.getElementById("packs").value="";
      document.getElementById("reels").value="05";

    }else{

      alert(r.error || "فشل الحفظ");

    }

  })

  .catch(e=>{

    alert("خطأ: "+e);

  });

}
  </script>

</body>

</html>
