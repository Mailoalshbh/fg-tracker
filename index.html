<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>FG Tracker</title>

<script src="https://unpkg.com/@zxing/browser@latest"></script>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
margin:0;
}

h2{
text-align:center;
}

video{
width:100%;
border:2px solid #999;
border-radius:10px;
margin-top:15px;
}

input{
width:100%;
padding:12px;
font-size:18px;
margin-top:10px;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
font-size:18px;
margin-top:12px;
}

#status{
margin-top:15px;
font-weight:bold;
color:green;
text-align:center;
}

</style>

</head>

<body>

<h2>FG Tracker</h2>

<video id="video" autoplay playsinline></video>

<div id="status">
اضغط Scan لبدء القراءة
</div>

<input id="wo" placeholder="Work Order">

<input id="pallet" placeholder="Pallet">

<input id="packs" placeholder="Packs">

<input id="reels" placeholder="Reels">

<button onclick="startScanner()">
📷 Scan Barcode
</button>

<button onclick="saveData()">
Save
</button>

<script>
  const video = document.getElementById("video");
const status = document.getElementById("status");

let codeReader = null;

async function startScanner() {

  try {

    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: "environment"
      }
    });

    document.getElementById("video").srcObject = stream;

    alert("الكاميرا اشتغلت");

  } catch (e) {

    alert(e.name + "\n" + e.message);

  }

}

}
  function saveData(){

  const wo = document.getElementById("wo").value;
  const pallet = document.getElementById("pallet").value;
  const packs = document.getElementById("packs").value;
  const reels = document.getElementById("reels").value;

  if(!wo || !pallet || !packs){
    alert("اقرأ الباركود أولاً");
    return;
  }

  const noEntry = wo + "-" + pallet.padStart(3,"0");

  fetch("https://script.google.com/macros/s/AKfycbxvJC89G5wcuWkJQT7PxcztVrWYAMV_BAe4bMr0qswV2QHbkmbo03pSWoWUzk3tEdRaCA/exec", {

  method: "POST",

  body: JSON.stringify({

    workOrder: wo,

    pallet: pallet,

    packs: packs,

    reels: reels

  })

})

.then(r => r.json())

.then(r => {

  if(r.success){

    status.innerHTML="✅ تم الحفظ";

    document.getElementById("wo").value="";

    document.getElementById("pallet").value="";

    document.getElementById("packs").value="";

    document.getElementById("reels").value="";

  }else{

    alert(r.error);

  }

})

.catch(e=>alert(e));

}

</script>

</body>
</html>
